spring.application.name=dmmps-gerenciador-de-ferramentas-backend
# Define que o profile 'local' é o ativo por padrăo
spring.profiles.active=local
# JWT
api.security.token.secret=${JWT_SECRET:dmmps-secret-local}

# Banco H2 em memória
spring.datasource.url=jdbc:h2:mem:dmmps;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Console H2 (acessível pelo browser)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console